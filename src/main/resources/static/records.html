<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>销售记录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:#f5f6fa}
.header{background:#2c3e50;color:white;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.header h2{font-size:18px}
.header .nav a{color:#bdc3c7;text-decoration:none;margin-left:20px;font-size:14px}
.header .nav a:hover,.header .nav a.active{color:white}
.header .user{font-size:13px;color:#bdc3c7}
.content{padding:20px;max-width:1200px;margin:0 auto}
.toolbar{display:flex;gap:12px;margin-bottom:16px;align-items:center}
.toolbar input{padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;width:200px}
.btn{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;transition:0.3s}
.btn-primary{background:#3498db;color:white}.btn-primary:hover{background:#2980b9}
.btn-info{background:#17a2b8;color:white}
.btn-sm{padding:4px 12px;font-size:12px}
table{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
th{background:#f8f9fa;padding:12px;text-align:left;font-size:13px;color:#666;border-bottom:2px solid #eee}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f0f0f0}
tr:hover{background:#f8f9ff}
.pagination{margin-top:16px;display:flex;justify-content:center;gap:8px}
.pagination button{padding:6px 14px;border:1px solid #ddd;background:white;border-radius:4px;cursor:pointer}
.pagination button:disabled{opacity:0.5;cursor:not-allowed}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:white;border-radius:12px;padding:24px;width:700px;max-height:85vh;overflow-y:auto}
.modal-box h3{margin-bottom:16px;color:#333}
.modal-box .info-row{display:flex;gap:24px;margin-bottom:12px;font-size:13px;color:#666}
.modal-box .info-row span{color:#333;font-weight:bold}
.detail-table{width:100%;border-collapse:collapse;margin-top:12px}
.detail-table th,.detail-table td{padding:8px;font-size:12px;border:1px solid #eee}
.detail-table th{background:#f8f9fa}
.total-row{text-align:right;font-size:16px;font-weight:bold;margin-top:12px;color:#e74c3c}
</style>
</head>
<body>
<div class="header">
<h2>🛒 超市前台销售系统</h2>
<div class="nav">
<a href="index.html">首页</a>
<a href="product.html">商品管理</a>
<a href="cashier.html">收银台</a>
<a href="records.html" class="active">销售记录</a>
</div>
<div class="user" id="userInfo"></div>
</div>
<div class="content">
<div class="toolbar">
<input type="text" id="keyword" placeholder="搜索订单号">
<button class="btn btn-primary" onclick="search()">搜索</button>
</div>
<table>
<thead><tr><th>订单编号</th><th>金额(元)</th><th>折扣</th><th>实收</th><th>支付方式</th><th>收银员</th><th>商品种类</th><th>时间</th><th>操作</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
<div class="pagination" id="pagination"></div>
</div>
<!-- 详情弹窗 -->
<div class="modal" id="detailModal"><div class="modal-box">
<h3>订单详情</h3>
<div class="info-row" id="detailInfo"></div>
<table class="detail-table">
<thead><tr><th>商品名称</th><th>单价</th><th>数量</th><th>单位</th><th>小计</th></tr></thead>
<tbody id="detailTable"></tbody>
</table>
<div class="total-row" id="detailTotal"></div>
<div style="text-align:right;margin-top:16px"><button class="btn" onclick="closeDetail()" style="background:#999;color:white">关闭</button></div>
</div></div>
<script src="common.js"></script>
<script>
var currentUser=null,currentPage=1,pageSize=10;
function init(){var u=checkLogin();if(!u)return;currentUser=u;document.getElementById('userInfo').textContent=u.realName+(u.roleType==1?' (管理员)':' (收银员)');search()}
function showMsg(msg,isError){alert(msg)}
function search(){var kw=document.getElementById('keyword').value.trim();ajax_get('/api/sales/page?keyword='+encodeURIComponent(kw)+'&page='+currentPage+'&limit='+pageSize,function(resp){if(resp.code===200){renderTable(resp.data.list);renderPagination(resp.data.total)}})}
function renderTable(list){var html='';if(!list||list.length===0){html='<tr><td colspan=\"9\" style=\"text-align:center;padding:40px;color:#999\">暂无销售记录</td></tr>'}else{list.forEach(function(o){var pm='';if(o.paymentMethod==1)pm='现金';else if(o.paymentMethod==2)pm='微信';else pm='支付宝';html+='<tr>';html+='<td>'+o.orderNo+'</td>';html+='<td>&yen;'+fmtMoney(o.totalAmount)+'</td>';html+='<td>&yen;'+fmtMoney(o.discountAmount)+'</td>';html+='<td>&yen;'+fmtMoney(o.paidAmount)+'</td>';html+='<td>'+pm+'</td>';html+='<td>'+o.realName+'</td>';html+='<td>'+o.detailCount+'种</td>';html+='<td>'+fmtTime(o.createTime)+'</td>';html+='<td><button class=\"btn btn-info btn-sm\" onclick=\"showDetail('+o.orderId+')\">详情</button></td>';html+='</tr>'})}document.getElementById('tableBody').innerHTML=html}
function renderPagination(total){var totalPages=Math.ceil(total/pageSize);var html='<button '+(currentPage<=1?'disabled':'')+' onclick=\"goPage('+(currentPage-1)+')\">上一页</button>';html+='<span style=\"line-height:32px;margin:0 10px;font-size:13px\">第 '+currentPage+'/'+totalPages+' 页 (共'+total+'条)</span>';html+='<button '+(currentPage>=totalPages?'disabled':'')+' onclick=\"goPage('+(currentPage+1)+')\">下一页</button>';document.getElementById('pagination').innerHTML=html}
function goPage(p){currentPage=p;search()}
function showDetail(id){ajax_get('/api/sales/detail/'+id,function(resp){if(resp.code===200){var o=resp.data.order;var details=resp.data.details;var pm='';if(o.paymentMethod==1)pm='现金';else if(o.paymentMethod==2)pm='微信';else pm='支付宝';document.getElementById('detailInfo').innerHTML='<div>订单编号: <span>'+o.orderNo+'</span></div><div>收银员: <span>'+o.realName+'</span></div><div>支付方式: <span>'+pm+'</span></div><div>时间: <span>'+fmtTime(o.createTime)+'</span></div>';var html='';details.forEach(function(d){html+='<tr><td>'+d.productName+'</td><td>&yen;'+fmtMoney(d.price)+'</td><td>'+d.quantity+'</td><td>'+d.unit+'</td><td>&yen;'+fmtMoney(d.subtotal)+'</td></tr>'});document.getElementById('detailTable').innerHTML=html;document.getElementById('detailTotal').innerHTML='合计: ¥'+fmtMoney(o.totalAmount)+'  |  折扣: ¥'+fmtMoney(o.discountAmount)+'  |  实收: ¥'+fmtMoney(o.paidAmount)+'  |  找零: ¥'+fmtMoney(o.changeAmount);document.getElementById('detailModal').classList.add('show')}})}
function closeDetail(){document.getElementById('detailModal').classList.remove('show')}
init();
</script>
</body>
</html>
