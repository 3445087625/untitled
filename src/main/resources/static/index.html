<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市前台销售系统 - 首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; min-height: 100vh; }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 0 30px; height: 60px; display: flex;
            align-items: center; justify-content: space-between;
        }
        .header .logo { font-size: 20px; font-weight: bold; }
        .header .user-info { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header .user-info button {
            background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5);
            padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .header .user-info button:hover { background: rgba(255,255,255,0.3); }
        .nav {
            background: white; display: flex; padding: 0 30px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .nav a {
            display: inline-block; padding: 16px 24px; text-decoration: none;
            color: #666; font-size: 15px; border-bottom: 2px solid transparent; transition: 0.3s;
        }
        .nav a:hover, .nav a.active { color: #667eea; border-bottom-color: #667eea; }
        .content { padding: 24px 30px; max-width: 1400px; margin: 0 auto; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .card {
            background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex; align-items: center; gap: 20px;
        }
        .card .icon {
            width: 60px; height: 60px; border-radius: 12px; display: flex;
            align-items: center; justify-content: center; font-size: 28px;
        }
        .card .icon.purple { background: #ede9fe; color: #7c3aed; }
        .card .icon.green { background: #d1fae5; color: #059669; }
        .card .icon.blue { background: #dbeafe; color: #2563eb; }
        .card .icon.orange { background: #fff7ed; color: #ea580c; }
        .card .info h3 { font-size: 14px; color: #999; margin-bottom: 6px; }
        .card .info .num { font-size: 28px; font-weight: bold; color: #333; }
        .panel {
            background: white; border-radius: 10px; padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px;
        }
        .panel h2 { font-size: 18px; color: #333; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
        .panel table { width: 100%; border-collapse: collapse; }
        .panel th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 13px; color: #666; border-bottom: 2px solid #eee; }
        .panel td { padding: 12px; font-size: 14px; color: #333; border-bottom: 1px solid #f0f0f0; }
        .panel tr:hover td { background: #fafbfc; }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; }
        .badge.success { background: #d1fae5; color: #059669; }
        .badge.info { background: #dbeafe; color: #2563eb; }
        .empty { text-align: center; color: #999; padding: 30px; font-size: 14px; }
    </style>
</head>
<body>
<div class="header">
    <div class="logo">🛒 超市前台销售系统</div>
    <div class="user-info">
        <span id="userName">--</span>
        <button onclick="logout()">退出</button>
    </div>
</div>

<div class="nav">
    <a href="index.html" class="active">📊 首页概览</a>
    <a href="product.html">📦 商品管理</a>
    <a href="cashier.html">💰 收银台</a>
    <a href="records.html">📋 销售记录</a>
</div>

<div class="content">
    <div class="cards">
        <div class="card">
            <div class="icon purple">📦</div>
            <div class="info"><h3>商品总数</h3><div class="num" id="productCount">--</div></div>
        </div>
        <div class="card">
            <div class="icon green">📋</div>
            <div class="info"><h3>今日订单</h3><div class="num" id="todayOrderCount">--</div></div>
        </div>
        <div class="card">
            <div class="icon blue">💰</div>
            <div class="info"><h3>今日销售额</h3><div class="num" id="todayAmount">--</div></div>
        </div>
        <div class="card">
            <div class="icon orange">📁</div>
            <div class="info"><h3>商品分类</h3><div class="num" id="categoryCount">--</div></div>
        </div>
    </div>

    <div class="panel">
        <h2>📋 最新销售订单</h2>
        <div id="recentOrders"></div>
    </div>
</div>

<script>
var user = JSON.parse(localStorage.getItem('loginUser') || 'null');
if (!user) { window.location.href = '/login.html'; }

document.getElementById('userName').textContent = (user.realName || user.username) +
    (user.roleType === 1 ? '(管理员)' : '(收银员)');

function logout() {
    ajax('POST', '/api/user/logout', null, function() {
        localStorage.removeItem('loginUser');
        window.location.href = '/login.html';
    });
}

function ajax(method, url, data, callback) {
    var xhr = new XMLHttpRequest();
    xhr.open(method, url, true);
    xhr.setRequestHeader('Content-Type', 'application/json;charset=UTF-8');
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            try { var resp = JSON.parse(xhr.responseText); callback(resp); }
            catch(e) { console.error(e); }
        }
    };
    xhr.send(data ? JSON.stringify(data) : null);
}

// 加载统计数据
function loadStats() {
    ajax('GET', '/api/product/page?page=1&limit=1', null, function(resp) {
        if (resp.code === 200 && resp.data) {
            document.getElementById('productCount').textContent = resp.data.total || 0;
        }
    });
    ajax('GET', '/api/category/list', null, function(resp) {
        if (resp.code === 200 && resp.data) {
            document.getElementById('categoryCount').textContent = resp.data.length || 0;
        }
    });
    ajax('GET', '/api/sales/page?page=1&limit=1', null, function(resp) {
        if (resp.code === 200 && resp.data) {
            document.getElementById('todayOrderCount').textContent = resp.data.total || 0;
        }
    });
    document.getElementById('todayAmount').textContent = '--';
}

// 加载最近订单
function loadRecentOrders() {
    ajax('GET', '/api/sales/page?page=1&limit=5', null, function(resp) {
        var html = '';
        if (resp.code === 200 && resp.data && resp.data.list && resp.data.list.length > 0) {
            html = '<table><thead><tr><th>订单编号</th><th>收银员</th><th>总金额</th><th>实收</th><th>支付方式</th><th>时间</th><th>状态</th></tr></thead><tbody>';
            resp.data.list.forEach(function(o) {
                var pm = o.paymentMethod === 1 ? '现金' : o.paymentMethod === 2 ? '微信' : '支付宝';
                html += '<tr><td>' + o.orderNo + '</td><td>' + (o.realName || '--') + '</td>' +
                        '<td>¥' + (o.totalAmount || 0) + '</td><td>¥' + (o.paidAmount || 0) + '</td>' +
                        '<td>' + pm + '</td><td>' + (o.createTime || '--') + '</td>' +
                        '<td><span class="badge ' + (o.orderStatus === 1 ? 'success' : 'info') + '">' +
                        (o.orderStatus === 1 ? '已完成' : '已退货') + '</span></td></tr>';
            });
            html += '</tbody></table>';
        } else {
            html = '<div class="empty">暂无销售记录</div>';
        }
        document.getElementById('recentOrders').innerHTML = html;
    });
}

loadStats();
loadRecentOrders();
</script>
</body>
</html>
