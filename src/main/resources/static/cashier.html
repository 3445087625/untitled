<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收银台</title>
<link rel="stylesheet" href="common.css">
<style>
    .cashier-layout { display: flex; height: calc(100vh - 100px); }
    .cashier-left   { flex: 1; padding: 16px; display: flex; flex-direction: column; min-width: 0; }
    .cashier-right  { width: 380px; background: white; display: flex; flex-direction: column; box-shadow: -2px 0 8px rgba(0,0,0,0.06); }
    .search-row     { display: flex; gap: 10px; margin-bottom: 12px; }
    .search-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; transition: 0.3s; }
    .search-row input:focus { border-color: var(--primary); }
    .product-grid   { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 10px; align-content: start; }
    .product-card   { background: white; border: 1px solid #eee; border-radius: 10px; padding: 14px; cursor: pointer; transition: 0.2s; }
    .product-card:hover { border-color: var(--primary); box-shadow: 0 4px 14px rgba(102,126,234,0.15); transform: translateY(-1px); }
    .product-card .pc-name  { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 6px; }
    .product-card .pc-info  { font-size: 12px; color: #999; margin-bottom: 4px; }
    .product-card .pc-price { font-size: 18px; color: #e74c3c; font-weight: bold; }
    .product-card .pc-stock { font-size: 11px; color: #999; margin-top: 2px; }
    .cart-header { padding: 16px; border-bottom: 1px solid #eee; font-size: 16px; font-weight: 600; display: flex; justify-content: space-between; }
    .cart-header span { font-size: 12px; color: #999; font-weight: normal; }
    .cart-body   { flex: 1; overflow-y: auto; padding: 12px; }
    .cart-item   { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
    .cart-item .ci-name { flex: 1; font-size: 13px; color: #333; }
    .cart-item .ci-qty  { display: flex; align-items: center; gap: 6px; margin: 0 10px; }
    .cart-item .ci-qty button { width: 26px; height: 26px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; font-size: 14px; transition: 0.2s; }
    .cart-item .ci-qty button:hover { background: #f0f0f0; }
    .cart-item .ci-qty span { width: 28px; text-align: center; font-size: 13px; }
    .cart-item .ci-price { font-size: 13px; color: #e74c3c; min-width: 60px; text-align: right; }
    .cart-item .ci-del   { color: #ccc; cursor: pointer; margin-left: 8px; font-size: 18px; transition: 0.2s; }
    .cart-item .ci-del:hover { color: #e74c3c; }
    .cart-footer { padding: 16px; border-top: 1px solid #eee; }
    .cart-footer .cf-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; color: #666; }
    .cart-footer .cf-row.cf-total { font-size: 20px; font-weight: bold; color: #e74c3c; margin-top: 4px; }
    .cart-footer .cf-input { margin: 10px 0; }
    .cart-footer .cf-input label { font-size: 12px; color: #999; display: block; margin-bottom: 4px; }
    .cart-footer .cf-input input, .cart-footer .cf-input select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .cart-footer .cf-btns { display: flex; gap: 10px; margin-top: 14px; }
    .cart-footer .cf-btns button { flex: 1; padding: 12px; font-size: 16px; }
    .empty-cart { text-align: center; padding: 60px 20px; color: #ccc; font-size: 14px; }
    .empty-cart small { display: block; margin-top: 6px; font-size: 12px; }

    /* 会员弹窗 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.show { display: flex; }
    .modal-card { background: white; border-radius: 14px; padding: 32px; width: 420px; max-width: 90vw; box-shadow: 0 10px 40px rgba(0,0,0,0.2); animation: modalIn 0.25s ease; }
    @keyframes modalIn { from { opacity: 0; transform: translateY(-20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .modal-card .modal-title { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 20px; text-align: center; }
    .modal-card .modal-section { margin-bottom: 16px; }
    .modal-card .modal-section label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
    .modal-card .modal-search { display: flex; gap: 8px; }
    .modal-card .modal-search input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; transition: 0.3s; }
    .modal-card .modal-search input:focus { border-color: var(--primary); }
    .modal-card .modal-search button { padding: 10px 18px; font-size: 14px; white-space: nowrap; }
    .modal-card .modal-result { background: #f8f9fc; border-radius: 10px; padding: 16px; margin-top: 12px; display: none; }
    .modal-card .modal-result.show { display: block; }
    .modal-card .modal-result .mr-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
    .modal-card .modal-result .mr-row .mr-label { color: #999; }
    .modal-card .modal-result .mr-row .mr-value { color: #333; font-weight: 500; }
    .modal-card .modal-result .mr-points-tip { text-align: center; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #dde; font-size: 13px; color: #e67e22; font-weight: 600; }
    .modal-card .modal-error { color: #e74c3c; font-size: 13px; margin-top: 8px; display: none; }
    .modal-card .modal-error.show { display: block; }
    .modal-card .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .modal-card .modal-actions button { flex: 1; padding: 12px; font-size: 15px; }
    .modal-card .modal-redeem { margin-top: 12px; padding-top: 12px; border-top: 1px dashed #dde; }
    .modal-card .modal-redeem label { font-size: 13px; color: #e67e22; font-weight: 600; }
</style>
</head>
<body>
<header class="header">
    <div class="header-left"><span class="logo">🛒 超市前台销售系统</span></div>
    <div class="header-right"><span class="header-user" id="userInfo"></span><button class="logout-btn" onclick="logout()">退出</button></div>
</header>

<nav class="nav">
    <a href="#" class="nav-link" onclick="event.preventDefault();navigateTo('/index.html')">📊 首页概览</a>
    <a href="#" class="nav-link" onclick="event.preventDefault();navigateTo('/product.html')">📦 商品管理</a>
    <a href="#" class="nav-link active">💰 收银台</a>
    <a href="#" class="nav-link" onclick="event.preventDefault();navigateTo('/records.html')">📋 销售记录</a>
</nav>

<div class="fade-in cashier-layout">
    <div class="cashier-left">
        <div class="search-row">
            <input type="text" id="keyword" placeholder="🔍 搜索商品名称或条形码..." onkeydown="if(event.key==='Enter')searchProduct()">
            <button class="btn btn-primary" onclick="searchProduct()">搜索</button>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </div>
    <div class="cashier-right">
        <div id="cartMsg" class="msg"></div>
        <div class="cart-header">🛍 购物车 <span id="cartCount">0件商品</span></div>
        <div class="cart-body" id="cartBody"></div>
        <div class="cart-footer">
            <div class="cf-row"><span>商品总数</span><span id="totalQty">0</span></div>
            <div class="cf-row"><span>商品金额</span><span>¥<span id="totalAmount">0.00</span></span></div>
            <div class="cf-row"><span>折扣</span><span>¥<span id="discountVal">0.00</span></span></div>
            <div class="cf-row cf-total"><span>应收金额</span><span>¥<span id="receivable">0.00</span></span></div>
            <div class="cf-input" id="discountRow"><label>折扣金额</label><input type="number" id="discountInput" value="0" step="0.01" onchange="calcTotal()"></div>
            <div class="cf-input" id="paidRow"><label>实收金额</label><input type="number" id="paidInput" value="0" step="0.01" onchange="calcChange()" placeholder="请输入实收金额"></div>
            <div class="cf-row" id="changeRow"><span>找零</span><span>¥<span id="changeAmount">0.00</span></span></div>
            <div class="cf-input"><label>支付方式</label><select id="paymentMethod" onchange="onPayMethodChange()"><option value="1">💵 现金</option><option value="2">💚 微信</option><option value="3">💙 支付宝</option></select></div>
            <div class="cf-btns"><button class="btn btn-cancel" onclick="clearCart()">清空</button><button class="btn btn-success" onclick="showMemberModal()">收款 ¥<span id="submitAmount">0.00</span></button></div>
        </div>
    </div>
</div>

<!-- 会员弹窗 -->
<div class="modal-overlay" id="memberModal">
    <div class="modal-card">
        <div class="modal-title">🎫 会员验证</div>
        <div class="modal-section" id="lookupSection">
            <label>请输入会员账号</label>
            <div class="modal-search">
                <input type="text" id="memberAccountInput" placeholder="输入11位会员账号，如 11111111111" onkeydown="if(event.key==='Enter')lookupMember()">
                <button class="btn btn-primary" onclick="lookupMember()">查询</button>
            </div>
            <div class="modal-error" id="memberError"></div>
        </div>
        <div class="modal-section" id="registerSection" style="display:none">
            <label>注册新会员（输入11位账号）</label>
            <div class="modal-search">
                <input type="text" id="registerAccountInput" placeholder="输入11位会员账号，如 55555555555" onkeydown="if(event.key==='Enter')registerMember()">
                <button class="btn btn-primary" onclick="registerMember()">注册</button>
            </div>
            <div class="modal-error" id="registerError"></div>
        </div>
        <div class="modal-result" id="memberResult">
            <div class="mr-row"><span class="mr-label">会员昵称</span><span class="mr-value" id="mrNickname">--</span></div>
            <div class="mr-row"><span class="mr-label">会员账号</span><span class="mr-value" id="mrAccountNo">--</span></div>
            <div class="mr-row"><span class="mr-label">当前积分</span><span class="mr-value" id="mrPoints">--</span></div>
            <div class="mr-points-tip" id="mrPointsTip"></div>
        </div>
        <div class="modal-redeem" id="redeemSection" style="display:none">
            <label>🎁 积分兑换（100积分 = ¥1）</label>
            <div class="modal-search" style="margin-top:6px">
                <input type="number" id="redeemInput" placeholder="输入兑换积分，如 1000" min="0" step="100" onkeydown="if(event.key==='Enter')applyRedeem()">
                <button class="btn btn-warning" onclick="applyRedeem()">兑换</button>
            </div>
            <div style="font-size:12px;color:#999;margin-top:4px" id="redeemPreview"></div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="skipMember()">跳过（非会员）</button>
            <button class="btn btn-success" id="confirmMemberBtn" onclick="confirmWithMember()" disabled>确认收款</button>
        </div>
        <div class="modal-actions" style="margin-top:18px">
            <button class="btn btn-primary" id="toggleRegisterBtn" onclick="toggleRegisterMode()">📝 注册新会员</button>
        </div>
    </div>
</div>

<script src="common.js"></script>
<script>
var currentUser=null, cart=[], currentMember=null, redeemPoints=0;

function init(){currentUser=checkLogin();if(!currentUser)return;document.getElementById('userInfo').textContent=currentUser.realName;searchProduct()}
function logout(){ajax_post('/api/user/logout',null,function(){localStorage.removeItem('loginUser');navigateTo('/login.html')})}
function showMsg(msg,isError){var el=document.getElementById('cartMsg');el.className='msg '+(isError?'msg-error':'msg-success');el.textContent=msg;setTimeout(function(){el.className='msg'},3000)}
function searchProduct(){var kw=document.getElementById('keyword').value.trim();ajax_get('/api/product/search?keyword='+encodeURIComponent(kw),function(resp){if(resp.code===200)renderProducts(resp.data)})}
function renderProducts(list){var html='';if(!list||list.length===0){html='<div class="empty">没有找到商品</div>'}else{list.forEach(function(p){html+='<div class="product-card" onclick="addToCart('+p.productId+',\''+p.productName.replace(/'/g,"&#39;")+'\','+p.price+',\''+(p.unit||'个')+'\','+p.stock+')"><div class="pc-name">'+p.productName+'</div><div class="pc-info">'+p.categoryName+' | '+p.unit+'</div><div class="pc-price">¥'+fmtMoney(p.price)+'</div><div class="pc-stock">库存: '+p.stock+'</div></div>'})}document.getElementById('productGrid').innerHTML=html}
function addToCart(id,name,price,unit,stock){if(stock<=0){showMsg('该商品库存不足',true);return}var found=null;cart.forEach(function(item){if(item.productId===id)found=item});if(found){if(found.qty>=stock){showMsg('库存不足,当前库存:'+stock,true);return}found.qty++}else{cart.push({productId:id,productName:name,price:price,unit:unit,qty:1,stock:stock})}renderCart()}
function changeQty(index,delta){var item=cart[index];var newQty=item.qty+delta;if(newQty<=0){cart.splice(index,1)}else if(newQty>item.stock){showMsg('库存不足,当前库存:'+item.stock,true);return}else{item.qty=newQty}renderCart()}
function removeItem(index){cart.splice(index,1);renderCart()}
function clearCart(){cart=[];renderCart()}
function calcTotal(){var total=0;cart.forEach(function(item){total+=item.price*item.qty});var discount=parseFloat(document.getElementById('discountInput').value)||0;if(discount>total){discount=total;document.getElementById('discountInput').value=fmtMoney(total);showMsg('折扣不能超过商品金额，已自动调整为 ¥'+fmtMoney(total),true)}var receivable=total-discount;document.getElementById('totalAmount').textContent=fmtMoney(total);document.getElementById('discountVal').textContent=fmtMoney(discount);document.getElementById('receivable').textContent=fmtMoney(receivable);document.getElementById('submitAmount').textContent=fmtMoney(receivable);syncPayMethod()}
function calcChange(){var receivable=parseFloat(document.getElementById('receivable').textContent)||0;var paid=parseFloat(document.getElementById('paidInput').value)||0;document.getElementById('changeAmount').textContent=fmtMoney(paid-receivable)}
function syncPayMethod(){var method=parseInt(document.getElementById('paymentMethod').value);if(method!==1){var receivable=parseFloat(document.getElementById('receivable').textContent)||0;document.getElementById('paidInput').value=fmtMoney(receivable);document.getElementById('changeAmount').textContent='0.00'}}
function onPayMethodChange(){var method=parseInt(document.getElementById('paymentMethod').value);var paidInput=document.getElementById('paidInput');var changeRow=document.getElementById('changeRow');if(method===1){paidInput.disabled=false;paidInput.value='';paidInput.placeholder='请输入实收金额';changeRow.style.display='';calcChange()}else{var receivable=parseFloat(document.getElementById('receivable').textContent)||0;paidInput.value=fmtMoney(receivable);paidInput.disabled=true;paidInput.placeholder='';changeRow.style.display='none';document.getElementById('changeAmount').textContent='0.00'}}
function renderCart(){var html='';document.getElementById('cartCount').textContent=cart.length+'件商品';var totalQty=0;if(cart.length===0){html='<div class="empty-cart">🛒 购物车是空的<br><small>点击左侧商品添加</small></div>'}else{cart.forEach(function(item,index){totalQty+=item.qty;html+='<div class="cart-item"><div class="ci-name">'+item.productName+'<br><small style="color:#999">¥'+fmtMoney(item.price)+'/'+item.unit+'</small></div><div class="ci-qty"><button onclick="changeQty('+index+',-1)">-</button><span>'+item.qty+'</span><button onclick="changeQty('+index+',1)">+</button></div><div class="ci-price">¥'+fmtMoney(item.price*item.qty)+'</div><div class="ci-del" onclick="removeItem('+index+')">×</div></div>'})}document.getElementById('cartBody').innerHTML=html;document.getElementById('totalQty').textContent=totalQty;calcTotal()}

// ========== 会员弹窗逻辑 ==========

function showMemberModal(){
    if(cart.length===0){showMsg('购物车为空',true);return}
    var paid=parseFloat(document.getElementById('paidInput').value)||0;
    var receivable=parseFloat(document.getElementById('receivable').textContent)||0;
    if(paid<receivable){showMsg('实收金额不足',true);return}

    // 重置弹窗
    currentMember=null;
    redeemPoints=0;
    document.getElementById('memberAccountInput').value='';
    document.getElementById('registerAccountInput').value='';
    document.getElementById('memberError').className='modal-error';
    document.getElementById('registerError').className='modal-error';
    document.getElementById('memberResult').className='modal-result';
    document.getElementById('confirmMemberBtn').disabled=true;
    document.getElementById('registerSection').style.display='none';
    document.getElementById('lookupSection').style.display='';
    document.getElementById('redeemSection').style.display='none';
    document.getElementById('redeemInput').value='';
    document.getElementById('redeemPreview').textContent='';
    document.getElementById('toggleRegisterBtn').textContent='📝 注册新会员';
    document.getElementById('memberModal').classList.add('show');
    setTimeout(function(){document.getElementById('memberAccountInput').focus();},300);
}

function lookupMember(){
    var accountNo=document.getElementById('memberAccountInput').value.trim();
    if(!accountNo){document.getElementById('memberError').className='modal-error show';document.getElementById('memberError').textContent='请输入会员账号';return}
    document.getElementById('memberError').className='modal-error';
    document.getElementById('memberResult').className='modal-result';
    document.getElementById('confirmMemberBtn').disabled=true;
    currentMember=null;

    ajax_get('/api/member/lookup?accountNo='+encodeURIComponent(accountNo),function(resp){
        if(resp.code===200){
            var m=resp.data;
            currentMember=m;
            document.getElementById('mrNickname').textContent=m.nickname;
            document.getElementById('mrAccountNo').textContent=m.accountNo;
            document.getElementById('mrPoints').textContent=m.points+' 积分';
            var paid=parseFloat(document.getElementById('paidInput').value)||0;
            var newPoints=Math.floor(paid);
            document.getElementById('mrPointsTip').textContent='本次消费可获得 +'+newPoints+' 积分';
            document.getElementById('memberResult').className='modal-result show';
            document.getElementById('confirmMemberBtn').disabled=false;
            // 积分兑换区域
            redeemPoints=0;
            document.getElementById('redeemInput').value='';
            document.getElementById('redeemPreview').textContent='';
            document.getElementById('redeemSection').style.display='';
        }else{
            document.getElementById('memberError').className='modal-error show';
            document.getElementById('memberError').textContent=resp.msg||'会员账号不存在';
        }
    });
}

function skipMember(){
    document.getElementById('memberModal').classList.remove('show');
    currentMember=null;
    doSubmitOrder();
}

function confirmWithMember(){
    if(!currentMember){lookupMember();return}
    document.getElementById('memberModal').classList.remove('show');
    doSubmitOrder(currentMember.memberId);
}

function doSubmitOrder(memberId){
    var paid=parseFloat(document.getElementById('paidInput').value)||0;
    var items=[];
    cart.forEach(function(item){items.push({productId:item.productId,quantity:item.qty})});
    var data={
        items:items,
        paidAmount:paid,
        discountAmount:parseFloat(document.getElementById('discountInput').value)||0,
        paymentMethod:parseInt(document.getElementById('paymentMethod').value)
    };
    if(memberId){data.memberId=memberId}
    if(redeemPoints>0){data.redeemPoints=redeemPoints}
    ajax_post('/api/sales/submit',data,function(resp){
        if(resp.code===200){
            var pointsMsg='';
            if(memberId&&currentMember){
                var netPoints=Math.floor(paid)-(redeemPoints||0);
                pointsMsg=' | 会员 '+currentMember.nickname;
                if(resp.data.redeemedPoints){
                    pointsMsg+=' 兑换 -'+resp.data.redeemedPoints+'积分(抵¥'+parseFloat(resp.data.redeemedAmount).toFixed(2)+')';
                }
                if(netPoints>0) pointsMsg+=' 消费 +'+netPoints+'积分';
            }
            showMsg('收款成功! 订单号:'+resp.data.orderNo+pointsMsg);
            cart=[];
            currentMember=null;
            redeemPoints=0;
            renderCart();
            searchProduct();
        }else{showMsg(resp.msg,true)}
    });
}

function applyRedeem(){
    if(!currentMember) return;
    var points=parseInt(document.getElementById('redeemInput').value)||0;
    if(points<=0){document.getElementById('redeemPreview').textContent='请输入有效积分数';return}
    if(points>currentMember.points){document.getElementById('redeemPreview').textContent='可用积分不足（当前：'+currentMember.points+'）';return}
    var amount=(points/100).toFixed(2);
    document.getElementById('redeemPreview').textContent='可抵扣 ¥'+amount+'（消耗 '+points+' 积分）';
    redeemPoints=points;
    // 同步实收：非现金自动调为应收，现金不变
    var method=parseInt(document.getElementById('paymentMethod').value);
    if(method!==1){
        var total=parseFloat(document.getElementById('totalAmount').textContent)||0;
        var oldDiscount=parseFloat(document.getElementById('discountInput').value)||0;
        var newReceivable=total-oldDiscount-parseFloat(amount);
        if(newReceivable<0)newReceivable=0;
        document.getElementById('paidInput').value=fmtMoney(newReceivable);
        document.getElementById('receivable').textContent=fmtMoney(newReceivable);
        document.getElementById('submitAmount').textContent=fmtMoney(newReceivable);
    }
}

function toggleRegisterMode(){
    var regSec=document.getElementById('registerSection');
    var lookupSec=document.getElementById('lookupSection');
    var resultSec=document.getElementById('memberResult');
    var btn=document.getElementById('toggleRegisterBtn');
    if(regSec.style.display==='none'){
        regSec.style.display='';
        lookupSec.style.display='none';
        resultSec.className='modal-result';
        btn.textContent='🔍 返回查询会员';
        document.getElementById('registerAccountInput').focus();
    }else{
        regSec.style.display='none';
        lookupSec.style.display='';
        btn.textContent='📝 注册新会员';
        document.getElementById('registerAccountInput').value='';
        document.getElementById('registerError').className='modal-error';
    }
}

function registerMember(){
    var accountNo=document.getElementById('registerAccountInput').value.trim();
    if(!accountNo){document.getElementById('registerError').className='modal-error show';document.getElementById('registerError').textContent='请输入11位会员账号';return}
    document.getElementById('registerError').className='modal-error';
    ajax_post('/api/member/register',{accountNo:accountNo},function(resp){
        if(resp.code===200){
            currentMember=resp.data;
            document.getElementById('registerSection').style.display='none';
            document.getElementById('toggleRegisterBtn').textContent='📝 注册新会员';
            document.getElementById('mrNickname').textContent=resp.data.nickname;
            document.getElementById('mrAccountNo').textContent=resp.data.accountNo;
            document.getElementById('mrPoints').textContent='0 积分';
            var paid=parseFloat(document.getElementById('paidInput').value)||0;
            var newPoints=Math.floor(paid);
            document.getElementById('mrPointsTip').textContent='注册成功！本次消费可获得 +'+newPoints+' 积分';
            document.getElementById('memberResult').className='modal-result show';
            document.getElementById('confirmMemberBtn').disabled=false;
        }else{
            document.getElementById('registerError').className='modal-error show';
            document.getElementById('registerError').textContent=resp.msg||'注册失败';
        }
    });
}

init();
</script>
