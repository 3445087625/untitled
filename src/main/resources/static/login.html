<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超市前台销售系统 - 登录</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; }
        .login-container {
            background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 420px; padding: 40px; animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .login-title { text-align: center; font-size: 24px; font-weight: bold; color: #333; margin-bottom: 6px; }
        .login-sub   { text-align: center; color: #999; font-size: 14px; margin-bottom: 30px; }
        .tabs { display: flex; margin-bottom: 24px; border-bottom: 2px solid #eee; }
        .tab  { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #999; font-size: 16px; transition: 0.3s; border-bottom:2px solid transparent; }
        .tab.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
        .form-group input, .form-group select { width:100%; padding:12px 16px; border:1px solid #ddd; border-radius:8px; font-size:14px; outline:none; transition:0.3s; }
        .form-group input:focus { border-color:#667eea; }
        .login-btn { width:100%; padding:12px; background: linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; transition:0.3s; }
        .login-btn:hover { opacity:0.9; transform: translateY(-1px); box-shadow:0 4px 12px rgba(102,126,234,0.4); }
        .login-msg { text-align:center; margin-top:10px; font-size:13px; min-height:20px; }
        .login-msg.error { color:#f44336; }
        .login-msg.success { color:#4caf50; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-title">🛒 超市前台销售系统</div>
    <div class="login-sub">数据库原理课程设计</div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">登录</div>
        <div class="tab" onclick="switchTab('register')">注册</div>
    </div>

    <div id="loginPanel" class="tab-panel active">
        <div class="form-group"><label>用户名</label><input type="text" id="loginUsername" placeholder="请输入用户名"></div>
        <div class="form-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()"></div>
        <button class="login-btn" onclick="login()">登 录</button>
        <div id="loginMsg" class="login-msg"></div>
    </div>

    <div id="registerPanel" class="tab-panel">
        <div class="form-group"><label>用户名</label><input type="text" id="regUsername" placeholder="请输入用户名"></div>
        <div class="form-group"><label>密码</label><input type="password" id="regPassword" placeholder="请输入密码"></div>
        <div class="form-group"><label>真实姓名</label><input type="text" id="regRealName" placeholder="请输入真实姓名"></div>
        <div class="form-group"><label>角色</label><select id="regRoleType"><option value="2">收银员</option><option value="1">管理员</option></select></div>
        <button class="login-btn" onclick="register()">注 册</button>
        <div id="regMsg" class="login-msg"></div>
    </div>
</div>

<script src="common.js"></script>
<script>
function switchTab(type) {
    document.querySelectorAll('.tab').forEach(function(t,i){ t.classList.toggle('active',(type==='login'&&i===0)||(type==='register'&&i===1))});
    document.getElementById('loginPanel').classList.toggle('active',type==='login');
    document.getElementById('registerPanel').classList.toggle('active',type==='register');
    document.getElementById('loginMsg').textContent='';
    document.getElementById('regMsg').textContent='';
}
function ajax(method,url,data,cb){
    var x=new XMLHttpRequest();x.open(method,url,true);x.setRequestHeader('Content-Type','application/json;charset=UTF-8');
    x.onreadystatechange=function(){if(x.readyState===4){cb(JSON.parse(x.responseText))}};
    x.send(data?JSON.stringify(data):null);
}
function login(){
    var u=document.getElementById('loginUsername').value.trim(),p=document.getElementById('loginPassword').value.trim(),m=document.getElementById('loginMsg');
    if(!u||!p){m.className='login-msg error';m.textContent='请输入用户名和密码';return}
    ajax('POST','/api/user/login',{username:u,password:p},function(r){
        if(r.code===200){m.className='login-msg success';m.textContent='登录成功，正在跳转...';localStorage.setItem('loginUser',JSON.stringify(r.data));navigateTo('/index.html')}
        else{m.className='login-msg error';m.textContent=r.msg}
    });
}
function register(){
    var u=document.getElementById('regUsername').value.trim(),p=document.getElementById('regPassword').value.trim(),n=document.getElementById('regRealName').value.trim(),r=document.getElementById('regRoleType').value,m=document.getElementById('regMsg');
    if(!u||!p||!n){m.className='login-msg error';m.textContent='请填写完整信息';return}
    ajax('POST','/api/user/register',{username:u,password:p,realName:n,roleType:parseInt(r),status:1},function(resp){
        if(resp.code===200){m.className='login-msg success';m.textContent='注册成功，请登录';setTimeout(function(){switchTab('login')},800)}
        else{m.className='login-msg error';m.textContent=resp.msg}
    });
}
</script>
</body>
</html>
