<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>销售记录</title>
<link rel="stylesheet" href="common.css">
<style>
    .table-card {
        background: white;
        border-radius: 14px;
        box-shadow: 0 2px 14px rgba(0,0,0,0.05);
        overflow: hidden;
    }
    .order-table { width: 100%; border-collapse: collapse; }
    .order-table th {
        background: #f7f8fc;
        padding: 15px 18px;
        font-size: 12px;
        color: #8c8fa1;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 1px solid #eef0f5;
    }
    .order-table th:first-child { padding-left: 24px; }
    .order-table th:last-child { padding-right: 24px; }
    .order-table td {
        padding: 14px 18px;
        font-size: 13px;
        color: #444;
        border-bottom: 1px solid #f5f6f9;
        vertical-align: middle;
        transition: background 0.15s;
    }
    .order-table td:first-child { padding-left: 24px; }
    .order-table td:last-child { padding-right: 24px; }
    .order-table tbody tr:hover { background: #fafbff; }
    .order-table .order-no { font-family: 'SF Mono', Consolas, monospace; font-size: 12px; color: #667eea; font-weight: 500; }
    .order-table .amount { font-weight: 600; color: #e74c3c; text-align: right; font-variant-numeric: tabular-nums; }
    .order-table .discount { color: #27ae60; font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }
    .order-table .paid { font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
    .order-table .payment-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 500;
    }
    .payment-badge.cash { background: #fff8e1; color: #f57f17; }
    .payment-badge.wechat { background: #e8f5e9; color: #2e7d32; }
    .payment-badge.alipay { background: #e3f2fd; color: #1565c0; }
    .order-table .item-count { font-size: 12px; color: #999; }
    .order-table .time-cell { font-size: 12px; color: #999; white-space: nowrap; }

    /* Modal 优化 */
    .detail-modal-box { width: 640px; }
    .detail-header {
        display: flex; flex-wrap: wrap; gap: 16px 30px;
        padding: 20px 24px;
        background: #f7f8fc;
        border-radius: 10px;
        margin-bottom: 18px;
    }
    .detail-header .dh-item { font-size: 12px; color: #999; }
    .detail-header .dh-item span { display: block; font-size: 15px; color: #333; font-weight: 600; margin-top: 3px; }
    .salary-line {
        display: flex; justify-content: space-between; align-items: center;
        padding: 16px 24px;
        background: #fff5f5;
        border-radius: 10px;
        margin-top: 16px;
    }
    .salary-line .label { font-size: 14px; color: #666; }
    .salary-line .value { font-size: 22px; font-weight: 700; color: #e74c3c; }
    .salary-line .sub { font-size: 11px; color: #999; margin-left: 8px; }
    .detail-table { width: 100%; border-collapse: collapse; }
    .detail-table th { background: #f7f8fc; padding: 10px 14px; font-size: 11px; color: #8c8fa1; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f5f6f9; }
    .detail-table td:last-child { font-weight: 600; color: #e74c3c; }
    .detail-table tr:last-child td { border-bottom: none; }
</style>
</head>
<body>
<header class="header">
    <div class="header-left"><span class="logo">🛒 超市前台销售系统</span></div>
    <div class="header-right"><span class="header-user" id="userInfo"></span><button class="logout-btn" onclick="logout()">退出</button></div>
</header>

<nav class="nav">
    <a href="#" class="nav-link" onclick="event.preventDefault();navigateTo('/index.html')">📊 首页概览</a>
    <a href="#" class="nav-link" onclick="event.preventDefault();navigateTo('/product.html')">📦 商品管理</a>
    <a href="#" class="nav-link" onclick="event.preventDefault();navigateTo('/cashier.html')">💰 收银台</a>
    <a href="#" class="nav-link active">📋 销售记录</a>
</nav>

<div class="content fade-in">
    <div class="toolbar" style="margin-bottom:20px">
        <input type="text" id="keyword" placeholder="🔍 搜索订单号..." class="toolbar-input" onkeydown="if(event.key==='Enter')search()">
        <button class="btn btn-primary" onclick="search()">搜索</button>
    </div>
    <div class="table-card">
        <table class="order-table">
            <thead><tr><th>订单编号</th><th>收银员</th><th class="th-right">金额</th><th class="th-right">折扣</th><th class="th-right">实收</th><th>支付方式</th><th>商品</th><th>时间</th><th>操作</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="pagination" id="pagination"></div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="detailModal"><div class="modal-box detail-modal-box">
    <h3 class="modal-title">📋 订单详情</h3>
    <div class="detail-header" id="detailInfo"></div>
    <table class="detail-table"><thead><tr><th>商品名称</th><th>单价</th><th>数量</th><th>小计</th></tr></thead><tbody id="detailTable"></tbody></table>
    <div id="detailTotal" style="margin-top:14px"></div>
    <div class="modal-btns"><button class="btn btn-cancel" onclick="closeDetail()">关闭</button></div>
</div></div>

<script src="common.js"></script>
<script>
var currentUser=null, currentPage=1, pageSize=10;
function init(){currentUser=checkLogin();if(!currentUser)return;document.getElementById('userInfo').textContent=currentUser.realName+(currentUser.roleType==1?' (管理员)':' (收银员)');search()}
function logout(){ajax('POST','/api/user/logout',null,function(){localStorage.removeItem('loginUser');navigateTo('/login.html')})}
function search(){var kw=document.getElementById('keyword').value.trim();ajax_get('/api/sales/page?keyword='+encodeURIComponent(kw)+'&page='+currentPage+'&limit='+pageSize,function(resp){if(resp.code===200){renderTable(resp.data.list);renderPagination(resp.data.total)}})}
function renderTable(list){var html='';if(!list||list.length===0){html='<tr><td colspan="9" style="text-align:center;padding:60px 20px;color:#bbb;font-size:14px"><div style="font-size:40px;margin-bottom:10px">📋</div>暂无销售记录</td></tr>'}else{list.forEach(function(o){var pm='',pc='';if(o.paymentMethod==1){pm='现金';pc='cash'}else if(o.paymentMethod==2){pm='微信';pc='wechat'}else{pm='支付宝';pc='alipay'}html+='<tr><td class="order-no">'+o.orderNo+'</td><td>'+o.realName+'</td><td class="amount">¥'+fmtMoney(o.totalAmount)+'</td><td class="discount">'+(o.discountAmount>0?'-¥'+fmtMoney(o.discountAmount):'—')+'</td><td class="paid">¥'+fmtMoney(o.paidAmount)+'</td><td><span class="payment-badge '+pc+'">'+pm+'</span></td><td class="item-count">'+o.detailCount+' 种</td><td class="time-cell">'+fmtTime(o.createTime)+'</td><td><button class="btn btn-primary btn-sm" onclick="showDetail('+o.orderId+')">详情</button></td></tr>'})}document.getElementById('tableBody').innerHTML=html}
function renderPagination(total){var tp=Math.ceil(total/pageSize);var html='<button '+(currentPage<=1?'disabled':'')+' onclick="goPage('+(currentPage-1)+')">上一页</button>';html+='<span class="page-info">第 '+currentPage+'/'+tp+' 页 (共'+total+'条)</span>';html+='<button '+(currentPage>=tp?'disabled':'')+' onclick="goPage('+(currentPage+1)+')">下一页</button>';document.getElementById('pagination').innerHTML=html}
function goPage(p){currentPage=p;search()}
function showDetail(id){ajax_get('/api/sales/detail/'+id,function(resp){if(resp.code===200){var o=resp.data.order,d=resp.data.details;var pm='',pc='';if(o.paymentMethod==1){pm='现金';pc='cash'}else if(o.paymentMethod==2){pm='微信';pc='wechat'}else{pm='支付宝';pc='alipay'}document.getElementById('detailInfo').innerHTML='<div class="dh-item">订单编号<span>'+o.orderNo+'</span></div><div class="dh-item">收银员<span>'+o.realName+'</span></div><div class="dh-item">支付方式<span>'+pm+'</span></div><div class="dh-item">时间<span>'+fmtTime(o.createTime)+'</span></div>';var html='';d.forEach(function(i){html+='<tr><td>'+i.productName+'</td><td>¥'+fmtMoney(i.price)+'</td><td>×'+i.quantity+'</td><td>¥'+fmtMoney(i.subtotal)+'</td></tr>'});document.getElementById('detailTable').innerHTML=html;var discountHtml=o.discountAmount>0?'<div style="text-align:right;font-size:13px;color:#27ae60;margin-bottom:6px">折扣: -¥'+fmtMoney(o.discountAmount)+'</div>':'';var changeHtml=o.changeAmount>0?'<span class="sub">找零 ¥'+fmtMoney(o.changeAmount)+'</span>':'';document.getElementById('detailTotal').innerHTML=discountHtml+'<div class="salary-line"><span class="label">实收金额</span><span><span class="value">¥'+fmtMoney(o.paidAmount)+'</span>'+changeHtml+'</span></div>'}});document.getElementById('detailModal').classList.add('show')}
function closeDetail(){document.getElementById('detailModal').classList.remove('show')}
init();
</script>
</body>
</html>
