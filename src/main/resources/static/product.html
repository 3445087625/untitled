<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品管理</title>
<link rel="stylesheet" href="common.css">
<style>
    .table-card {
        background: white; border-radius: 14px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        overflow: hidden;
    }
    .product-table { width: 100%; border-collapse: collapse; table-layout: auto; }
    .product-table thead { background: linear-gradient(180deg, #f8f9fc 0%, #f1f3f8 100%); }
    .product-table th {
        padding: 14px 16px; font-size: 12px; color: #7f8c9b;
        font-weight: 600; letter-spacing: 0.3px; text-align: left;
        border-bottom: 2px solid #e8ecf1; white-space: nowrap;
    }
    .product-table td {
        padding: 13px 16px; font-size: 13px; color: #444;
        border-bottom: 1px solid #f2f3f6; vertical-align: middle;
    }
    .product-table tbody tr { transition: background 0.15s; }
    .product-table tbody tr:hover { background: #f8f9ff; }
    .product-table tbody tr:last-child td { border-bottom: none; }
    .product-table .col-id     { width: 50px; color: #999; font-size: 12px; }
    .product-table .col-name   { min-width: 160px; font-weight: 500; color: #333; }
    .product-table .col-cat    { min-width: 80px; }
    .product-table .col-price  { width: 90px; text-align: right; font-weight: 500; font-variant-numeric: tabular-nums; }
    .product-table .col-stock  { width: 80px; text-align: center; }
    .product-table .col-unit   { width: 60px; text-align: center; color: #888; font-size: 12px; }
    .product-table .col-barcode{ width: 120px; font-family: 'Consolas',monospace; font-size: 12px; color: #888; }
    .product-table .col-status { width: 70px; text-align: center; }
    .product-table .col-action { width: 140px; text-align: right; white-space: nowrap; }
    .stock-num { font-weight: 600; font-variant-numeric: tabular-nums; }
    .stock-low  { color: #e74c3c !important; }
    .stock-mid  { color: #f39c12 !important; }
    .stock-high { color: #27ae60 !important; }

    /* 编辑弹窗 - 双列 */
    .modal-form-grid {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 14px 20px;
    }
    .modal-form-grid .full-width { grid-column: 1 / -1; }

    /* 分类弹窗 */
    .cat-inline { display: flex; gap: 10px; margin-bottom: 16px; }
    .cat-inline input { flex: 1; padding: 9px 14px; border: 1.5px solid #e0e3e8; border-radius: 8px; font-size: 13px; outline: none; }
    .cat-inline input:focus { border-color: #667eea; }
    .cat-table { width: 100%; border-collapse: collapse; }
    .cat-table th { background: #f7f8fc; padding: 10px 14px; font-size: 12px; color: #8c8fa1; text-align: left; }
    .cat-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid #f2f3f6; }
</style>
</head>
<body>
<header class="header">
    <div class="header-left"><span class="logo">🛒 超市前台销售系统</span></div>
    <div class="header-right"><span class="header-user" id="userInfo"></span><button class="logout-btn" onclick="logout()">退出</button></div>
</header>

<nav class="nav">
    <a href="#" class="nav-link" onclick="event.preventDefault();navigateTo('/index.html')">📊 首页概览</a>
    <a href="#" class="nav-link active">📦 商品管理</a>
    <a href="#" class="nav-link" onclick="event.preventDefault();navigateTo('/cashier.html')">💰 收银台</a>
    <a href="#" class="nav-link" onclick="event.preventDefault();navigateTo('/records.html')">📋 销售记录</a>
</nav>

<div class="content fade-in">
    <div id="msgBox" class="msg"></div>

    <div class="toolbar" style="padding:18px 22px; background:white; border-radius:12px; margin-bottom:18px; box-shadow:0 1px 6px rgba(0,0,0,0.04);">
        <input type="text" id="keyword" placeholder="🔍 搜索商品名称或条形码..." style="flex:1;max-width:320px;padding:9px 14px;border:1.5px solid #e0e3e8;border-radius:8px;font-size:13px;outline:none">
        <select id="filterCategory" style="padding:9px 14px;border:1.5px solid #e0e3e8;border-radius:8px;font-size:13px;background:white;min-width:140px">
            <option value="0">📁 全部分类</option>
        </select>
        <button class="btn btn-primary" onclick="search()">🔍 搜索</button>
        <span style="flex:1"></span>
        <button class="btn btn-success" onclick="showAddModal()">＋ 新增商品</button>
        <button class="btn btn-warning" onclick="showCategoryModal()">📁 分类管理</button>
    </div>

    <div class="table-card">
        <table class="product-table">
            <thead><tr><th class="col-id">ID</th><th class="col-name">商品名称</th><th class="col-cat">分类</th><th class="col-price">单价</th><th class="col-stock">库存</th><th class="col-unit">单位</th><th class="col-barcode">条形码</th><th class="col-status">状态</th><th class="col-action">操作</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div class="pagination" id="pagination"></div>
</div>

<!-- 商品编辑弹窗 -->
<div class="modal" id="productModal"><div class="modal-box" style="width:560px">
    <h3 class="modal-title" id="modalTitle">新增商品</h3>
    <input type="hidden" id="editId">
    <div class="modal-form-grid">
        <div class="form-group full-width"><label>商品名称</label><input type="text" id="editName" placeholder="请输入商品名称"></div>
        <div class="form-group"><label>分类</label><select id="editCategory"></select></div>
        <div class="form-group"><label>单位</label><input type="text" id="editUnit" placeholder="个/箱/瓶/袋"></div>
        <div class="form-group"><label>单价 (元)</label><input type="number" id="editPrice" step="0.01" placeholder="0.00"></div>
        <div class="form-group"><label>库存数量</label><input type="number" id="editStock" placeholder="0"></div>
        <div class="form-group"><label>条形码</label><input type="text" id="editBarcode" placeholder="商品条形码"></div>
        <div class="form-group full-width"><label>状态</label><select id="editStatus"><option value="1">🟢 上架</option><option value="0">🔴 下架</option></select></div>
    </div>
    <div class="modal-btns"><button class="btn btn-cancel" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveProduct()">💾 保存</button></div>
</div></div>

<!-- 分类管理弹窗 -->
<div class="modal" id="categoryModal"><div class="modal-box" style="width:460px">
    <h3 class="modal-title">📁 分类管理</h3>
    <div class="cat-inline"><input type="text" id="newCategoryName" placeholder="输入分类名称..."><button class="btn btn-success" onclick="addCategory()">＋ 添加</button></div>
    <table class="cat-table"><thead><tr><th>ID</th><th>分类名称</th><th style="text-align:right">操作</th></tr></thead><tbody id="catTableBody"></tbody></table>
    <div class="modal-btns"><button class="btn btn-cancel" onclick="closeCategoryModal()">关闭</button></div>
</div></div>

<script src="common.js"></script>
<script>
var currentUser=null, currentPage=1, pageSize=10;
function init(){ currentUser=checkLogin(); if(!currentUser)return; document.getElementById('userInfo').textContent=currentUser.realName+(currentUser.roleType==1?' (管理员)':' (收银员)'); loadCategories(); search(); }
function logout(){ ajax_post('/api/user/logout',null,function(){localStorage.removeItem('loginUser');window.location.href='/login.html'})}
function showMsg(msg,isError){ var el=document.getElementById('msgBox'); el.className='msg '+(isError?'msg-error':'msg-success'); el.textContent=msg; setTimeout(function(){el.className='msg'},3000); }
function loadCategories(){ ajax_get('/api/category/list',function(resp){if(resp.code===200){var sel=document.getElementById('filterCategory'); resp.data.forEach(function(c){sel.innerHTML+='<option value="'+c.categoryId+'">'+c.categoryName+'</option>'})}}) }
function search(){ var kw=document.getElementById('keyword').value.trim(), cid=document.getElementById('filterCategory').value; ajax_get('/api/product/page?keyword='+encodeURIComponent(kw)+'&categoryId='+cid+'&page='+currentPage+'&limit='+pageSize,function(resp){if(resp.code===200){renderTable(resp.data.list);renderPagination(resp.data.total)}}) }
function renderTable(list){ var html=''; if(!list||list.length===0) html='<tr><td colspan="9" style="text-align:center;padding:60px;color:#bbb;font-size:14px"><div style="font-size:44px;margin-bottom:10px">📦</div>暂无商品数据</td></tr>'; else list.forEach(function(p){ var sc=''; if(p.stock===0)sc='stock-low'; else if(p.stock<20)sc='stock-mid'; else sc='stock-high'; html+='<tr><td class="col-id">#'+p.productId+'</td><td class="col-name">'+p.productName+'</td><td class="col-cat">'+p.categoryName+'</td><td class="col-price">¥'+fmtMoney(p.price)+'</td><td class="col-stock"><span class="stock-num '+sc+'">'+p.stock+'</span></td><td class="col-unit">'+p.unit+'</td><td class="col-barcode">'+(p.barcode||'—')+'</td><td class="col-status">'+(p.status==1?'<span class="badge badge-success">上架</span>':'<span class="badge badge-danger">下架</span>')+'</td><td class="col-action"><button class="btn btn-primary btn-sm" onclick="editProduct('+p.productId+')">编辑</button> <button class="btn btn-danger btn-sm" onclick="deleteProduct('+p.productId+')">删除</button></td></tr>' }); document.getElementById('tableBody').innerHTML=html; }
function renderPagination(total){ var tp=Math.ceil(total/pageSize); var h='<button '+(currentPage<=1?'disabled':'')+' onclick="goPage('+(currentPage-1)+')">上一页</button>'; h+='<span style="line-height:32px;margin:0 10px;font-size:13px;color:#666">第 '+currentPage+'/'+(tp||1)+' 页 (共'+total+'条)</span>'; h+='<button '+(currentPage>=tp?'disabled':'')+' onclick="goPage('+(currentPage+1)+')">下一页</button>'; document.getElementById('pagination').innerHTML=h; }
function goPage(p){ currentPage=p; search(); }
function showAddModal(){ document.getElementById('modalTitle').textContent='＋ 新增商品'; ['editId','editName','editPrice','editStock','editUnit','editBarcode'].forEach(function(id){document.getElementById(id).value=''}); document.getElementById('editStatus').value='1'; loadCategoryOptions(function(){document.getElementById('productModal').classList.add('show')}); }
function editProduct(id){ document.getElementById('modalTitle').textContent='✏️ 编辑商品'; ajax_get('/api/product/'+id,function(resp){if(resp.code===200){var p=resp.data;document.getElementById('editId').value=p.productId;document.getElementById('editName').value=p.productName;document.getElementById('editPrice').value=p.price;document.getElementById('editStock').value=p.stock;document.getElementById('editUnit').value=p.unit||'';document.getElementById('editBarcode').value=p.barcode||'';document.getElementById('editStatus').value=p.status;loadCategoryOptions(function(){document.getElementById('editCategory').value=p.categoryId;document.getElementById('productModal').classList.add('show')})}}) }
function loadCategoryOptions(cb){ ajax_get('/api/category/list',function(resp){if(resp.code===200){var h='';resp.data.forEach(function(c){h+='<option value="'+c.categoryId+'">'+c.categoryName+'</option>'});document.getElementById('editCategory').innerHTML=h;if(cb)cb()}}) }
function saveProduct(){ var id=document.getElementById('editId').value; var d={productName:document.getElementById('editName').value.trim(),categoryId:parseInt(document.getElementById('editCategory').value),price:parseFloat(document.getElementById('editPrice').value),stock:parseInt(document.getElementById('editStock').value),unit:document.getElementById('editUnit').value.trim(),barcode:document.getElementById('editBarcode').value.trim(),status:parseInt(document.getElementById('editStatus').value)}; if(id)d.productId=parseInt(id); if(!d.productName||!d.price||isNaN(d.stock)){showMsg('请填写完整信息',true);return} var url=id?'/api/product/update':'/api/product/add'; ajax_post(url,d,function(resp){if(resp.code===200){showMsg(resp.msg);closeModal();search()}else showMsg(resp.msg,true)}) }
function closeModal(){ document.getElementById('productModal').classList.remove('show'); }
function deleteProduct(id){ if(!confirm('确定删除该商品吗？'))return; ajax_post('/api/product/delete/'+id,null,function(resp){showMsg(resp.msg,resp.code!==200);if(resp.code===200)search()}) }
function showCategoryModal(){ loadCategoryTable(); document.getElementById('categoryModal').classList.add('show'); }
function closeCategoryModal(){ document.getElementById('categoryModal').classList.remove('show'); }
function addCategory(){ var n=document.getElementById('newCategoryName').value.trim(); if(!n){showMsg('请输入分类名称',true);return} ajax_post('/api/category/add',{categoryName:n},function(resp){if(resp.code===200){document.getElementById('newCategoryName').value='';loadCategoryTable();loadCategories()}showMsg(resp.msg,resp.code!==200)}) }
function loadCategoryTable(){ ajax_get('/api/category/list',function(resp){if(resp.code===200){var h='';resp.data.forEach(function(c){h+='<tr><td style="color:#999;font-size:12px">#'+c.categoryId+'</td><td>'+c.categoryName+'</td><td style="text-align:right"><button class="btn btn-danger btn-sm" onclick="delCategory('+c.categoryId+')">🗑 删除</button></td></tr>'});document.getElementById('catTableBody').innerHTML=h||'<tr><td colspan="3" style="text-align:center;color:#bbb;padding:30px">暂无分类</td></tr>'}}) }
function delCategory(id){ if(!confirm('确定删除该分类吗？关联商品将无法按此分类显示'))return; ajax_post('/api/category/delete/'+id,null,function(resp){showMsg(resp.msg,resp.code!==200);if(resp.code===200){loadCategoryTable();loadCategories()}}) }
init();
</script>
</body>
</html>
